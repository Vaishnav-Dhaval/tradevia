apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  labels:
    app: api-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
        - name: api-service
          image: imgbox/api:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "cd /app/packages/prisma && bunx prisma generate && bunx prisma db push && cd /app/apps/api-service && bun run src/index.ts"]
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              value: postgresql://myuser:mypassword@postgres:5432/trading_db
            - name: REDIS_URL
              value: redis://redis:6379
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: api-service
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP