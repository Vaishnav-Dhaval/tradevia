services:
  redis:
    image: redis:8.4.0-alpine
    restart: unless-stopped
    # ports:
    #   - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-service:
    build:
      context: .
      dockerfile: apps/api-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./apps/api-service/.env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  engine-service:
    build:
      context: .
      dockerfile: apps/engine-service/Dockerfile
    restart: unless-stopped
    # ports:
    #   - "3002:3002"
    environment:
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./apps/engine-service/.env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  price-poller-service:
    build:
      context: .
      dockerfile: apps/price-poller-service/Dockerfile
    restart: unless-stopped
    # ports:
    #   - "3003:3003"
    environment:
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./apps/price-poller-service/.env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  redis-data:
