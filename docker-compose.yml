services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: trading_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d trading_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tradevia-network

  redis:
    image: redis:8.4.0-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tradevia-network

  api-service:
    build:
      context: .
      dockerfile: Dockerfile.api-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - REDIS_URL=redis://:mypassword@redis:6379
      - DATABASE_URL=postgresql://myuser:mypassword@postgres:5432/trading_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "cd /app/packages/prisma && bunx prisma db push && cd /app/apps/api-service && node dist/index.js"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - tradevia-network

  engine-service:
    build:
      context: .
      dockerfile: Dockerfile.engine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:mypassword@redis:6379
      - DATABASE_URL=postgresql://myuser:mypassword@postgres:5432/trading_db
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - tradevia-network

  price-poller-service:
    build:
      context: .
      dockerfile: Dockerfile.price-poller
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:mypassword@redis:6379
      - DATABASE_URL=postgresql://myuser:mypassword@postgres:5432/trading_db
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - tradevia-network

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      - api-service
    networks:
      - tradevia-network

volumes:
  redis-data:
  postgres-data:

networks:
  tradevia-network:
    driver: bridge
