name: Docker Build and Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  filter:
    name: Check for Changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      should_run: ${{ steps.set-matrix.outputs.should_run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Path Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'apps/api-service/**'
              - 'packages/**'
              - 'Dockerfile.api-service'
              - 'bun.lock'
              - 'turbo.json'
            engine:
              - 'apps/engine-service/**'
              - 'packages/**'
              - 'Dockerfile.engine'
              - 'bun.lock'
              - 'turbo.json'
            price-poller:
              - 'apps/price-poller-service/**'
              - 'packages/redis/**'
              - 'Dockerfile.price-poller'
              - 'bun.lock'
              - 'turbo.json'
            web:
              - 'apps/web/**'
              - 'packages/ui/**'
              - 'packages/types/**'
              - 'Dockerfile.web'
              - 'bun.lock'
              - 'turbo.json'

      - name: Generate Matrix
        id: set-matrix
        run: |
          SERVICES='[]'
          
          # Function to add service to matrix
          add_service() {
            SERVICES=$(echo $SERVICES | jq -c ". + [{\"service\": \"$1\", \"dockerfile\": \"$2\", \"service_tag\": \"$3\"}]")
          }
          
          # Force all if manual, else check filters
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Event is workflow_dispatch. Forcing all services."
            add_service "api-service" "Dockerfile.api-service" "api"
            add_service "engine-service" "Dockerfile.engine" "engine"
            add_service "price-poller-service" "Dockerfile.price-poller" "price-poller"
            add_service "web" "Dockerfile.web" "web"
          else
            echo "Event is ${{ github.event_name }}. Checking filters."
            [[ "${{ steps.filter.outputs.api }}" == 'true' ]] && add_service "api-service" "Dockerfile.api-service" "api"
            [[ "${{ steps.filter.outputs.engine }}" == 'true' ]] && add_service "engine-service" "Dockerfile.engine" "engine"
            [[ "${{ steps.filter.outputs.price-poller }}" == 'true' ]] && add_service "price-poller-service" "Dockerfile.price-poller" "price-poller"
            [[ "${{ steps.filter.outputs.web }}" == 'true' ]] && add_service "web" "Dockerfile.web" "web"
          fi
          
          COUNT=$(echo $SERVICES | jq '. | length')
          echo "Services to build: $COUNT"
          
          if [ "$COUNT" -gt 0 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "matrix={\"include\":$SERVICES}" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
          fi
          
          echo "Matrix: $(echo $SERVICES | jq -c .)"

  build-and-push:
    name: Build & Push ${{ matrix.service }}
    needs: filter
    if: ${{ needs.filter.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.filter.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            imgbox/${{ matrix.service }}:latest
            imgbox/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
