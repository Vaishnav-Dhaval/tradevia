server {
    listen 80;
    server_name api.exness.dakshv.in www.api.exness.dakshv.in;

    return 301 https://api.exness.dakshv.in$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.exness.dakshv.in www.api.exness.dakshv.in;

    ssl_certificate /etc/letsencrypt/live/api.exness.dakshv.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.exness.dakshv.in/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}





step 1
cd /etc/nginx/sites-available

step 2
sudo vi backend.conf

step 3
sudo ln -s /etc/nginx/sites-available/backend.conf /etc/nginx/sites-enabled/

step 4
sudo rm /etc/nginx/sites-enabled/default

ls -l /etc/nginx/sites-enabled/

step 5
sudo nginx -t

step 6
sudo systemctl reload nginx


sudo apt update
sudo apt install certbot python3-certbot-nginx -y


sudo certbot --nginx -d api.exness.dakshv.in -d www.api.exness.dakshv.in


ping api.exness.dakshv.in
ping www.api.exness.dakshv.in
