# HTTP → HTTPS
server {
    listen 80;
    server_name api.exness.dakshv.in www.api.exness.dakshv.in;
    return 301 https://api.exness.dakshv.in$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.exness.dakshv.in www.api.exness.dakshv.in;

    ssl_certificate /etc/letsencrypt/live/api.exness.dakshv.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.exness.dakshv.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ---- CORS whitelist ----
    set $cors_origin "";

    if ($http_origin ~* "^https?://(www\.)?exness\.dakshv\.in$") {
        set $cors_origin $http_origin;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With,Accept" always;
    }

    # Preflight requests
    location = / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Credentials true;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
            add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With,Accept";
            return 204;
        }
    }
}

# Map WebSocket connection header
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}


